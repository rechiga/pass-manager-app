<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>

    <!-- static フォルダ内の style.css を読み込む -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- 白いカードの中央配置 -->
    <div class="card">
        <h1 class="app-title">パスワード管理アプリ</h1>
        <h2 class="sub-title">ログイン</h2>

        <!-- flashメッセージ表示 -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <p class="flash-message-error">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- ログインフォーム -->
        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username" class="form-label">ユーザー名</label>
                <input type="text" id="username" name="username" class="form-input">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">パスワード</label>
                <input type="password" id="password" name="password" class="form-input">
            </div>

            <button type="submit" class="button button-primary button-full">ログイン</button>
        </form>

        <p class="center-text" style="margin-top: 20px;">
            アカウントを持っていない場合は
            <a href="/register" class="text-link">こちら</a>
        </p>
    </div>
</body>
</html>
