<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>パスワード追加</title>

    <!-- 共通CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card">
        <h1 class="page-title">パスワード情報の追加</h1>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <p class="flash-message-error">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/add_password">
            <div class="form-group">
                <label for="service_name" class="form-label">サービス名</label>
                <input type="text" id="service_name" name="service_name" class="form-input">
            </div>

            <div class="form-group">
                <label for="login_id" class="form-label">ログインID</label>
                <input type="text" id="login_id" name="login_id" class="form-input">
            </div>

            <div class="form-group">
                <label for="password_value" class="form-label">パスワード</label>
                <input type="text" id="password_value" name="password_value" class="form-input">
            </div>

            <div class="form-group">
                <label for="memo" class="form-label">メモ</label>
                <textarea id="memo" name="memo" class="form-textarea"></textarea>
            </div>

            <div class="button-row">
                <button type="submit" class="button button-primary">保存する</button>
                <a href="/dashboard" class="button button-secondary">戻る</a>
            </div>
        </form>
    </div>
</body>
</html>
