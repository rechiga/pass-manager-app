<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>パスワード編集</title>

    <!-- 共通CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card">
        <h1 class="page-title">パスワード情報の編集</h1>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <p class="flash-message-error">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label class="form-label">サービス名</label>
                <input type="text" name="service_name" value="{{ data[2] }}" class="form-input">
            </div>

            <div class="form-group">
                <label class="form-label">ログインID</label>
                <input type="text" name="login_id" value="{{ data[3] }}" class="form-input">
            </div>

            <div class="form-group">
                <label class="form-label">パスワード</label>
                <input type="text" name="password_value" value="{{ data[4] }}" class="form-input">
            </div>

            <div class="form-group">
                <label class="form-label">メモ</label>
                <textarea name="memo" class="form-textarea">{{ data[5] }}</textarea>
            </div>

            <div class="button-row">
                <button type="submit" class="button button-primary">更新する</button>
                <a href="/dashboard" class="button button-secondary">戻る</a>
            </div>
        </form>
    </div>
</body>
</html>
