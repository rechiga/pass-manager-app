<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新規登録</title>

    <!-- 共通CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card">
        <h1 class="app-title">パスワード管理アプリ</h1>
        <h2 class="sub-title">新規登録</h2>

        <!-- flashメッセージ表示 -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <p class="flash-message-error">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/register">
            <div class="form-group">
                <label for="username" class="form-label">ユーザー名</label>
                <input type="text" id="username" name="username" class="form-input">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">パスワード</label>
                <input type="password" id="password" name="password" class="form-input">
            </div>

            <button type="submit" class="button button-primary button-full">登録する</button>
        </form>

        <p class="center-text" style="margin-top: 20px;">
            すでにアカウントを持っている場合は
            <a href="/" class="text-link">こちら</a>
        </p>
    </div>
</body>
</html>
